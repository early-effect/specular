<?xml version="1.0" encoding="UTF-8"?>
<!--
  Early Effect mark: BJT Early effect x ZIO-flavoured playfulness.
  Narrowing base (base-width modulation) + for-comprehension emitter bind,
  with a tiny fiber fork on the base lead. Theme accents via CSS variables.
  Drop .bg for transparent embeds.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     role="img"
     aria-label="Early Effect">
  <title>Early Effect</title>
  <desc>BJT with narrowing base (Early effect) and a playful ZIO-style fiber fork</desc>

  <style>
    :root {
      --ee-bg: #000000;
      --ee-trace: #7ee787;
      --ee-trace-dim: #3fb950;
      --ee-pad: #c9a227;
      --ee-spark: #ffffff;
      --ee-stroke: 14;
    }
    .bg { fill: var(--ee-bg); }
    .trace {
      fill: none;
      stroke: var(--ee-trace);
      stroke-width: var(--ee-stroke);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .trace-thin {
      fill: none;
      stroke: var(--ee-trace);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .trace-dim {
      fill: none;
      stroke: var(--ee-trace-dim);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.85;
    }
    .pad {
      fill: none;
      stroke: var(--ee-pad);
      stroke-width: var(--ee-stroke);
    }
    .pad-fill { fill: var(--ee-bg); stroke: none; }
    .fill-trace { fill: var(--ee-trace); stroke: none; }
    .spark {
      fill: none;
      stroke: var(--ee-spark);
      stroke-width: 3.5;
      stroke-linecap: round;
      opacity: 0.9;
    }
    .spark-dot { fill: var(--ee-spark); stroke: none; opacity: 0.9; }
  </style>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%"
            filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect class="bg" width="512" height="512"/>

  <g filter="url(#glow)">
    <!-- ===== Fiber fork on the base (playful ZIO forkFiber) ===== -->
    <path class="trace-thin" d="M 72 220 C 96 220, 112 236, 128 256"/>
    <path class="trace-thin" d="M 72 292 C 96 292, 112 276, 128 256"/>
    <circle class="pad-fill" cx="72" cy="220" r="11"/>
    <circle class="pad" cx="72" cy="220" r="11"/>
    <circle class="pad-fill" cx="72" cy="292" r="11"/>
    <circle class="pad" cx="72" cy="292" r="11"/>

    <!-- Base lead into the device -->
    <path class="trace" d="M 128 256 H 214"/>

    <!-- ===== Transistor envelope ===== -->
    <circle class="trace" cx="310" cy="256" r="110"/>

    <!-- Collector / emitter stems + gold pads -->
    <path class="trace" d="M 310 146 V 88"/>
    <path class="trace" d="M 310 366 V 424"/>
    <circle class="pad-fill" cx="310" cy="74" r="16"/>
    <circle class="pad" cx="310" cy="74" r="16"/>
    <circle class="pad-fill" cx="310" cy="438" r="16"/>
    <circle class="pad" cx="310" cy="438" r="16"/>

    <!--
      Narrowing base = Early effect (base-width modulation).
      Three bars, each shorter toward the collector: also reads like
      stacked effect channels / ZIO R-E-A layers getting tighter.
    -->
    <path class="trace" d="M 246 182 V 330"/>
    <path class="trace" d="M 268 198 V 314" style="stroke-width:11"/>
    <path class="trace" d="M 288 218 V 294" style="stroke-width:8"/>

    <!-- Collector arm -->
    <path class="trace" d="M 248 230 L 356 178"/>

    <!-- Emitter arm + for-comprehension-style bind arrow (<- rotated into the emitter) -->
    <path class="trace" d="M 248 282 L 348 330"/>
    <!-- arrowhead as a playful `<-` chevron on the emitter -->
    <path class="fill-trace" d="M 318 306 L 358 338 L 312 348 Z"/>

    <!-- Tiny Early-voltage fan: IC rising with VCE (the effect showing up) -->
    <path class="trace-dim" d="M 360 250 L 400 236"/>
    <path class="trace-dim" d="M 360 262 L 404 262"/>
    <path class="trace-dim" d="M 360 274 L 400 288"/>

    <!-- Spark accents: little fiber glitter -->
    <path class="spark" d="M 96 196 l -8 -12"/>
    <path class="spark" d="M 96 316 l -8 12"/>
    <circle class="spark-dot" cx="150" cy="240" r="2.5"/>
    <circle class="spark-dot" cx="150" cy="272" r="2.5"/>
  </g>
</svg>
