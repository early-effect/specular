<?xml version="1.0" encoding="UTF-8"?>
<!--
  Early Effect mark: BJT transistor x intelligence node.
  Recreated to match images/logo.png (neon green + gold on black).
  Drop the .bg rect for transparent embeds.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1024 1024"
     role="img"
     aria-label="Early Effect">
  <title>Early Effect</title>
  <desc>Stylized BJT transistor fused with a neural intelligence node</desc>

  <defs>
    <!-- userSpaceOnUse: objectBoundingBox filters vanish on zero-width/height strokes -->
    <filter id="ee-glow" x="0" y="0" width="1024" height="1024"
            filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.30
                0 0 0 0 0.92
                0 0 0 0 0.52
                0 0 0 0.42 0" result="tint"/>
      <feMerge>
        <feMergeNode in="tint"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ee-glow-gold" x="0" y="0" width="1024" height="1024"
            filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.90
                0 0 0 0 0.70
                0 0 0 0 0.18
                0 0 0 0.50 0" result="tint"/>
      <feMerge>
        <feMergeNode in="tint"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="ee-trace" gradientUnits="userSpaceOnUse" x1="160" y1="220" x2="820" y2="820">
      <stop offset="0%"   stop-color="#9ef0b0"/>
      <stop offset="45%"  stop-color="#4fe078"/>
      <stop offset="100%" stop-color="#2ecf9a"/>
    </linearGradient>

    <linearGradient id="ee-stem-top" gradientUnits="userSpaceOnUse" x1="608" y1="340" x2="608" y2="168">
      <stop offset="0%"   stop-color="#4fe078"/>
      <stop offset="55%"  stop-color="#7aeb90"/>
      <stop offset="100%" stop-color="#e0b84a"/>
    </linearGradient>
    <linearGradient id="ee-stem-bot" gradientUnits="userSpaceOnUse" x1="608" y1="684" x2="608" y2="856">
      <stop offset="0%"   stop-color="#4fe078"/>
      <stop offset="55%"  stop-color="#7aeb90"/>
      <stop offset="100%" stop-color="#e0b84a"/>
    </linearGradient>

    <linearGradient id="ee-pad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="36" y2="36">
      <stop offset="0%"   stop-color="#f2d36e"/>
      <stop offset="100%" stop-color="#c99520"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1024" height="1024" fill="#000000"/>

  <!-- ===== Intelligence / neural cluster (left) ===== -->
  <g filter="url(#ee-glow)">
    <!-- hub -->
    <circle cx="286" cy="512" r="28" fill="#000000" stroke="url(#ee-trace)" stroke-width="14"/>

    <!-- organic branches toward gold pads + green tips -->
    <path d="M 268 496 C 230 460, 205 400, 188 360"
          fill="none" stroke="url(#ee-trace)" stroke-width="15" stroke-linecap="round"/>
    <path d="M 268 528 C 232 560, 208 600, 190 630"
          fill="none" stroke="url(#ee-trace)" stroke-width="15" stroke-linecap="round"/>

    <path d="M 272 500 C 240 470, 200 455, 165 460"
          fill="none" stroke="url(#ee-trace)" stroke-width="14" stroke-linecap="round"/>
    <path d="M 270 522 C 235 555, 205 590, 170 615"
          fill="none" stroke="url(#ee-trace)" stroke-width="14" stroke-linecap="round"/>

    <path d="M 290 488 C 305 450, 295 410, 270 385"
          fill="none" stroke="url(#ee-trace)" stroke-width="13" stroke-linecap="round"/>
    <path d="M 298 530 C 320 565, 315 605, 290 635"
          fill="none" stroke="url(#ee-trace)" stroke-width="13" stroke-linecap="round"/>

    <path d="M 275 512 C 245 505, 215 515, 195 545"
          fill="none" stroke="url(#ee-trace)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 280 520 C 255 545, 250 575, 255 600"
          fill="none" stroke="url(#ee-trace)" stroke-width="12" stroke-linecap="round"/>

    <!-- green terminal dots -->
    <circle cx="165" cy="460" r="9" fill="#4fe078"/>
    <circle cx="170" cy="615" r="9" fill="#4fe078"/>
    <circle cx="270" cy="385" r="8" fill="#4fe078"/>
    <circle cx="290" cy="635" r="8" fill="#4fe078"/>
    <circle cx="195" cy="545" r="7" fill="#4fe078"/>
    <circle cx="255" cy="600" r="7" fill="#4fe078"/>

    <!-- white sparks -->
    <path d="M 164 415 l -12 -18" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
    <path d="M 165 564 l -16 4" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
    <path d="M 311 412 l 8 -16" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <path d="M 308 567 l 6 14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <path d="M 262 371 l -4 -12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <path d="M 262 608 l -2 12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <circle cx="177" cy="428" r="3" fill="#ffffff" opacity="0.95"/>
    <circle cx="177" cy="555" r="3" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- gold pads on left cluster -->
  <g filter="url(#ee-glow-gold)">
    <circle cx="185" cy="355" r="16" fill="#000000"/>
    <circle cx="185" cy="355" r="16" fill="none" stroke="url(#ee-pad)" stroke-width="13"/>
    <circle cx="188" cy="630" r="16" fill="#000000"/>
    <circle cx="188" cy="630" r="16" fill="none" stroke="url(#ee-pad)" stroke-width="13"/>
  </g>

  <!-- Base lead: hub → transistor envelope (must paint; filter is userSpace) -->
  <path d="M 314 512 H 434"
        fill="none" stroke="url(#ee-trace)" stroke-width="16" stroke-linecap="round"
        filter="url(#ee-glow)"/>

  <!-- ===== Transistor body (right) — landmarks from logo.png ===== -->
  <g filter="url(#ee-glow)">
    <!-- envelope: left ~430, right ~785, cx~608, r~175 -->
    <circle cx="608" cy="512" r="175" fill="none" stroke="url(#ee-trace)" stroke-width="16"/>

    <!-- collector / emitter stems with green→gold -->
    <path d="M 608 337 V 168"
          fill="none" stroke="url(#ee-stem-top)" stroke-width="16" stroke-linecap="round"/>
    <path d="M 608 687 V 856"
          fill="none" stroke="url(#ee-stem-bot)" stroke-width="16" stroke-linecap="round"/>

    <!-- base bar (vertical), left of center -->
    <path d="M 560 418 V 606"
          fill="none" stroke="url(#ee-trace)" stroke-width="16" stroke-linecap="round"/>

    <!-- collector arm (up-right) -->
    <path d="M 560 478 L 720 395"
          fill="none" stroke="url(#ee-trace)" stroke-width="16" stroke-linecap="round"/>

    <!-- emitter arm (down-right) -->
    <path d="M 560 546 L 720 629"
          fill="none" stroke="url(#ee-trace)" stroke-width="16" stroke-linecap="round"/>

    <!-- emitter arrowhead -->
    <path d="M 675 595 L 728 634 L 668 640 Z" fill="#4fe078"/>
  </g>

  <!-- gold terminal pads top/bottom -->
  <g filter="url(#ee-glow-gold)">
    <circle cx="608" cy="155" r="22" fill="#000000"/>
    <circle cx="608" cy="155" r="22" fill="none" stroke="url(#ee-pad)" stroke-width="15"/>
    <circle cx="608" cy="869" r="22" fill="#000000"/>
    <circle cx="608" cy="869" r="22" fill="none" stroke="url(#ee-pad)" stroke-width="15"/>
  </g>
</svg>
