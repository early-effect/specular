<?xml version="1.0" encoding="UTF-8"?>
<!--
  Early Effect mark: transistor (Early Effect) x intelligence node.
  Adapt colors via the CSS variables in <style>, or override fill/stroke on use.
  Companion raster: logo.png
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     role="img"
     aria-label="Early Effect">
  <title>Early Effect</title>
  <desc>Stylized BJT transistor fused with a neural intelligence node</desc>

  <style>
    :root {
      --ee-bg: #0d1117;
      --ee-trace: #7ee787;
      --ee-pad: #c9a227;
      --ee-spark: #ffffff;
      --ee-stroke: 14;
    }
    .bg { fill: var(--ee-bg); }
    .trace {
      fill: none;
      stroke: var(--ee-trace);
      stroke-width: var(--ee-stroke);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .pad {
      fill: none;
      stroke: var(--ee-pad);
      stroke-width: var(--ee-stroke);
    }
    .pad-fill { fill: var(--ee-bg); stroke: none; }
    .spark {
      fill: none;
      stroke: var(--ee-spark);
      stroke-width: 4;
      stroke-linecap: round;
    }
    .spark-dot { fill: var(--ee-spark); stroke: none; }
  </style>

  <!-- Optional opaque backdrop; remove or set fill="none" for transparent embeds -->
  <rect class="bg" width="512" height="512" rx="64"/>

  <!-- Intelligence / neural cluster (left) -->
  <g id="intelligence" transform="translate(118 256)">
    <!-- hub -->
    <circle class="trace" cx="0" cy="0" r="22"/>
    <!-- radiating paths -->
    <path class="trace" d="M -10 -18 C -38 -48, -58 -42, -72 -28"/>
    <path class="trace" d="M -18 6 C -48 18, -62 38, -70 58"/>
    <path class="trace" d="M 4 -20 C 8 -52, -8 -68, -28 -74"/>
    <path class="trace" d="M 6 18 C 22 42, 18 62, 4 74"/>
    <!-- pads on cluster -->
    <circle class="pad-fill" cx="-72" cy="-28" r="11"/>
    <circle class="pad" cx="-72" cy="-28" r="11"/>
    <circle class="pad-fill" cx="-70" cy="58" r="11"/>
    <circle class="pad" cx="-70" cy="58" r="11"/>
    <!-- spark accents -->
    <path class="spark" d="M -46 -62 l -10 -14"/>
    <path class="spark" d="M -88 8 l -14 2"/>
    <path class="spark" d="M -42 72 l -6 12"/>
    <circle class="spark-dot" cx="-54" cy="-8" r="3"/>
    <circle class="spark-dot" cx="-28" cy="48" r="2.5"/>
  </g>

  <!-- Base lead into transistor -->
  <path class="trace" d="M 140 256 H 248"/>

  <!-- Transistor body (right) -->
  <g id="transistor" transform="translate(320 256)">
    <!-- envelope -->
    <circle class="trace" cx="0" cy="0" r="88"/>

    <!-- collector / emitter stems + pads -->
    <path class="trace" d="M 0 -88 V -148"/>
    <path class="trace" d="M 0 88 V 148"/>
    <circle class="pad-fill" cx="0" cy="-158" r="14"/>
    <circle class="pad" cx="0" cy="-158" r="14"/>
    <circle class="pad-fill" cx="0" cy="158" r="14"/>
    <circle class="pad" cx="0" cy="158" r="14"/>

    <!-- base bar (vertical) -->
    <path class="trace" d="M -28 -48 V 48"/>

    <!-- collector arm (up-right) -->
    <path class="trace" d="M -28 -18 L 48 -56"/>

    <!-- emitter arm (down-right) with arrow -->
    <path class="trace" d="M -28 18 L 48 56"/>
    <path class="trace" d="M 28 42 L 48 56 L 26 60"/>
  </g>
</svg>
